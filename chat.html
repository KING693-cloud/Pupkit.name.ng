<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Chat</title>

    <style>
        /* BASE & BACKGROUND */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
        body { 
            background: url('1.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
        }

        /* LOADING SCREEN */
        #loadingScreen{
            position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(12px);
            display:flex; align-items:center; justify-content:center; flex-direction:column;
            color:white; z-index:999999; transition:0.4s ease;
        }
        .spinner{
            width:50px; height:50px; border:4px solid rgba(255,255,255,0.2);
            border-top:4px solid #00d4ff; border-radius:50%;
            animation:spin 0.8s linear infinite; margin-bottom:15px;
        }
        @keyframes spin{ 100%{transform:rotate(360deg);} }

        /* CHAT CONTAINER */
        .chat-container{
            max-width: 600px;
            height:100vh; margin:auto; display:flex; flex-direction:column;
            background:rgba(0,0,0,0.85);
            border-left: 1px solid #333; border-right: 1px solid #333;
        }

        /* HEADER */
        .chat-header{
            background:#075e54; color:white; padding:15px; display:flex; align-items:center; gap:15px;
        }
        .avatar{ width:45px; height:45px; border-radius:50%; background:#333; }

        /* CHAT BOX */
        .chat-box{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }

        /* MESSAGES */
        .message{ max-width:80%; padding:12px; border-radius:18px; font-size:16px; word-break:break-word; animation:fade .15s ease; }
        .sent{ align-self:flex-end; background:#dcf8c6; }
        .received{ align-self:flex-start; background:#fff; }
        .bot{ align-self:flex-start; background:#ffeaa7; }
        
        /* CART HIGHLIGHT */
        .buy{ 
            align-self:center; 
            background: #00d4ff; 
            color:#000; 
            font-weight:700; 
            text-align:center; 
            width:90%; 
            padding:15px; 
            border-radius: 15px;
            border: 2px solid white;
        }

        /* TIME */
        .time{ font-size:10px; opacity:.6; margin-top:5px; text-align:right; }

        /* INPUT */
        .chat-input{ display:flex; padding:15px; background:#222; }
        .chat-input input{ flex:1; padding:15px; border:none; border-radius:30px; outline:none; font-size:16px; }
        .chat-input button{ margin-left:10px; border:none; background:#075e54; color:white; border-radius:50%; padding:15px; width: 50px; cursor: pointer; }

        @keyframes fade{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    </style>
</head>

<body>

    <div id="loadingScreen">
        <div class="spinner"></div>
        Connecting...
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div onclick="goBack()" style="cursor:pointer; font-size: 24px;">←</div>
            <div class="avatar"></div>
            <div>
                <div>Support Chat</div>
                <div id="userLabel" style="font-size:12px;opacity:.7"></div>
            </div>
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="chat-input">
            <input id="messageInput" placeholder="Type message...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, updateDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSy...",
            authDomain: "happytails-50138.firebaseapp.com",
            projectId: "happytails-50138",
        });

        const db = getFirestore(app);
        const chatBox = document.getElementById("chatBox");
        const messageInput = document.getElementById("messageInput");
        const userLabel = document.getElementById("userLabel");

        /* USER ID LOGIC */
        let userId = localStorage.getItem("chatUserId");
        if(!userId){
            userId = "USER" + Math.floor(Math.random()*9999);
            localStorage.setItem("chatUserId", userId);
        }
        userLabel.innerText = userId;

        const messagesRef = collection(db, "chats", userId, "messages");
        const chatRef = doc(db, "chats", userId);

        await setDoc(chatRef, { online: true }, { merge: true });

        /* RENDER */
        function render(d, id){
            const div = document.createElement("div");
            if(d.type === "buy"){
                div.className = "message buy";
                div.innerHTML = `🛒 ${d.text}<div class="time">${new Date(d.time).toLocaleTimeString()}</div>`;
            }
            else if(d.sender === "user"){
                div.className = "message sent";
                div.innerHTML = `${d.text}<div class="time">${new Date(d.time).toLocaleTimeString()}</div>`;
            }
            else if(d.sender === "bot"){
                div.className = "message bot";
                div.innerHTML = `${d.text}<div class="time">${new Date(d.time).toLocaleTimeString()}</div>`;
            }
            else{
                div.className = "message received";
                div.innerHTML = `${d.text}<div class="time">${new Date(d.time).toLocaleTimeString()}</div>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        /* REALTIME */
        onSnapshot(query(messagesRef, orderBy("time", "asc")), (snap) => {
            chatBox.innerHTML = "";
            snap.forEach(docSnap => { render(docSnap.data(), docSnap.id); });
            document.getElementById("loadingScreen").style.display = "none";
        });

        /* SEND MESSAGE */
        window.sendMessage = async () => {
            const text = messageInput.value.trim();
            if(!text) return;
            const now = Date.now();

            await addDoc(messagesRef, { text, sender: "user", time: now });

            await updateDoc(chatRef, {
                lastMessage: text,
                lastTime: now,
                lastSender: "customer",
                lastType: "text"
            });

            messageInput.value = "";
        };

        /* BUY LOGIC */
        const pendingBuy = JSON.parse(localStorage.getItem("pendingBuy"));
        if(pendingBuy){
            const buyText = `${pendingBuy.name} - ₦${pendingBuy.price}`;
            
            await addDoc(messagesRef, {
                text: buyText,
                sender: "user",
                type: "buy",
                time: pendingBuy.time
            });

            await updateDoc(chatRef, {
                lastMessage: buyText,
                lastTime: pendingBuy.time,
                lastSender: "customer",
                lastType: "buy"
            });

            localStorage.removeItem("pendingBuy");
        }

        /* BACK */
        window.goBack = () => location.href = "index.html";
    </script>
</body>
</html>
